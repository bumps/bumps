repos:
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0 # Matches your current version
    hooks:
      - id: eslint
        name: eslint
        # Use 'additional_dependencies' to ensure your Vue/TS plugins are present
        additional_dependencies:
          - "eslint@9.15.0"
          - "eslint-plugin-vue@10.5.1"
          - "@vue/eslint-config-typescript@14.6.0"
          - "eslint-plugin-vuejs-accessibility@2.4.1"
        # Point to your specific config file
        args: ["-c", "bumps/webview/client/eslint.config.js", "--fix"]
        files: \.(vue|js|ts|mjs|tsx|jsx)$
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
      - id: biome-format
        name: biome-format
        # Point to your subdirectory config to ensure spaces vs tabs are correct
        files: \.(vue|js|ts|mjs|tsx|jsx)$
        additional_dependencies: ["@biomejs/biome@1.9.4"]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0 # Current stable mirror version
    hooks:
      - id: prettier
        name: prettier-docs
        # Limit strictly to non-code files
        files: \.(md|yaml|yml)$
        # Recommended for Markdown to prevent weird line breaks in docs
        args: ["--prose-wrap", "always"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=8192]
        exclude: bumps/dream/random123
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: end-of-file-fixer
        exclude: |
          bumps/dream/random123
          bumps/webview/client/src
      - id: trailing-whitespace
        exclude: |
          bumps/dream/random123
          bumps/webview/client/src
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.1
    hooks:
      # - id: ruff
      #   args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--config=pyproject.toml]
        exclude: |
          bumps/dream/random123
          bumps/webview/client/src
          extra/platform_scripts

ci:
  autoupdate_schedule: monthly
  skip: [eslint]
