name: Test and Publish to PyPI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # Build a pure Python wheel and upload as an artifact
  build-wheel:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
      max_version: ${{ steps.set-matrix.outputs.max_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout Random123
        uses: actions/checkout@v6
        with:
          repository: "DEShawResearch/random123"
          ref: v1.14.0
          path: bumps/dream/random123

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Get Filtered Minor Versions
        id: set-matrix
        run: |
          # 1. Extract the minimum version (e.g., "3.10")
          MIN_VERSION=$(grep "requires-python" pyproject.toml | grep -oE '[0-9]+\.[0-9]+' | head -1)

          # 2. Use jq to compare as numeric arrays instead of strings
          # Logic: "3.9" -> [3, 9], "3.10" -> [3, 10].
          # jq compares arrays element-by-element numerically.
          RAW_JSON=$(uv python list --output-format json | jq -c --arg min "$MIN_VERSION" '
            ($min | split(".") | map(tonumber)) as $min_parts |
            [ .[] | .version | split(".") | .[0:2] | map(tonumber) ]
            | unique
            | map(select(. >= $min_parts))
            | sort
          ')

          # 3. Format the full matrix for the next job
          VERSIONS=$(echo "$RAW_JSON" | jq -c 'map(join("."))')

          # 4. Extract the absolute maximum version
          MAX_VERSION=$(echo "$RAW_JSON" | jq -r 'last | join(".")')

          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "max_version=$MAX_VERSION" >> $GITHUB_OUTPUT

          # Optional: Print to logs for debugging
          echo "Full Matrix: $VERSIONS"
          echo "Latest Version: $MAX_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: build webview
        run: |
          cd bumps/webview/client
          npm install
          npm run build
      - name: Create the wheel
        run: uv build

      - name: Upload the wheel and source distribution artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts
          path: |
            dist/bumps-*-py3-none-any.whl
            dist/bumps-*.tar.gz
  # Test the wheel on different platforms, test webview, and check docs build
  test:
    runs-on: ${{ matrix.os }}
    needs: build-wheel
    env:
      DEFAULT_PYTHON: ${{ needs.build-wheel.outputs.max_version }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        py: ${{ fromJson(needs.build-wheel.outputs.versions) }}
        include:
          - os: windows-latest
            py: "" # placeholder, will use default version
          - os: macos-latest
            py: ${{ needs.build-wheel.outputs.max_version }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download the wheel
        uses: actions/download-artifact@v7
        with:
          name: artifacts
          path: dist

      - name: Install the wheel
        run: |
          uv venv --python=${{ matrix.py }}
          find dist -name "bumps-*-py3-none-any.whl" -exec uv pip install {}[dev] \;

      - name: Run tests
        run: uv run python -m pytest -v

      - name: Check examples
        run: uv run python check_examples.py --chisq

      - name: Check fitters
        run: uv run python check_fitters.py

      - name: Check that the docs build (linux only)
        if: ${{ matrix.py == env.DEFAULT_PYTHON && matrix.os == 'ubuntu-latest' }}
        run: |
          source .venv/bin/activate
          make -j 4 -C doc SPHINXOPTS="-W --keep-going -n" html

  # Upload wheel to PyPI only when a tag is pushed, and its name begins with 'v'
  upload-to-pypi:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Retrieve all artifacts
        uses: actions/download-artifact@v7
        with:
          name: artifacts
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
